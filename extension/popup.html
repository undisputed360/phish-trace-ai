<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>PhishTrace AI</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        width: 340px;
        padding: 16px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
        background: #111827;
        color: #f3f4f6;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 12px;
      }
      .header h2 {
        font-size: 16px;
        font-weight: 700;
      }
      .badge {
        font-size: 10px;
        background: #2563eb;
        padding: 2px 6px;
        border-radius: 10px;
        color: white;
      }

      .url-box {
        background: #1f2937;
        border: 1px solid #374151;
        border-radius: 8px;
        padding: 8px 12px;
        font-size: 12px;
        color: #9ca3af;
        word-break: break-all;
        margin-bottom: 12px;
        max-height: 40px;
        overflow: hidden;
      }

      button {
        width: 100%;
        padding: 10px;
        background: #2563eb;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        font-size: 14px;
        transition: background 0.2s;
      }
      button:hover:not(:disabled) {
        background: #1d4ed8;
      }
      button:disabled {
        background: #374151;
        cursor: not-allowed;
      }

      #result {
        margin-top: 12px;
        padding: 12px;
        border-radius: 8px;
        font-size: 13px;
        display: none;
        line-height: 1.5;
      }

      .safe {
        background: #064e3b20;
        border: 1px solid #065f46;
        border-left: 4px solid #22c55e;
      }
      .danger {
        background: #7f1d1d20;
        border: 1px solid #7f1d1d;
        border-left: 4px solid #ef4444;
      }

      .score {
        font-size: 24px;
        font-weight: 700;
        margin: 4px 0;
      }
      .score-danger {
        color: #ef4444;
      }
      .score-safe {
        color: #22c55e;
      }

      .explanation {
        font-size: 12px;
        color: #d1d5db;
        margin-top: 6px;
      }

      .action {
        font-size: 12px;
        color: #fbbf24;
        margin-top: 8px;
        padding: 8px;
        background: #1f2937;
        border-radius: 6px;
      }

      .loading-spinner {
        display: inline-block;
        width: 14px;
        height: 14px;
        border: 2px solid #4b5563;
        border-top-color: #f3f4f6;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-right: 8px;
        vertical-align: middle;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .error-box {
        background: #7f1d1d20;
        border: 1px solid #7f1d1d;
        border-radius: 8px;
        padding: 10px;
        font-size: 12px;
        color: #fca5a5;
        margin-top: 12px;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <span>🛡️</span>
      <h2>PhishTrace AI</h2>
      <span class="badge">AI</span>
    </div>

    <div class="url-box" id="currentUrl">Loading...</div>

    <button id="scanBtn">🔍 Scan This Page</button>

    <div id="result"></div>
    <div id="errorBox" class="error-box"></div>

    <script src="popup.js"></script>
  </body>
</html>
